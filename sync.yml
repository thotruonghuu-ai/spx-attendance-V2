name: SPX Attendance Daily Sync

# ── Lịch chạy tự động ────────────────────────────────────────────
# 7:00 sáng giờ VN = 00:00 UTC (VN = UTC+7)
# Cú pháp: 'phút giờ * * *'
on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 07:00 sáng VN

  # Cho phép bấm chạy thủ công trên GitHub (để test)
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Chạy cho ngày cụ thể (YYYY-MM-DD). Để trống = N-1 tự động.'
        required: false
        default: ''

# ── Jobs ──────────────────────────────────────────────────────────
jobs:
  sync:
    name: Sync Attendance → Google Sheet
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Lấy code từ repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cài thư viện
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # 4. Chạy script sync
      - name: Run sync
        env:
          SPX_COOKIE:          ${{ secrets.SPX_COOKIE }}
          SPREADSHEET_ID:      ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME:          ${{ secrets.SHEET_NAME }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          DATE_OVERRIDE:       ${{ github.event.inputs.date_override }}
        run: python scripts/sync_attendance.py

      # 5. Thông báo kết quả (hiện trong log GitHub)
      - name: Done
        if: success()
        run: echo "✅ Sync thành công lúc $(date +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Failed
        if: failure()
        run: echo "❌ Sync thất bại! Kiểm tra log ở trên."
